<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타 광고 성과 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --text: #f0f4ff;
    --muted: #8896b3;
    --accent: #4f8ef7;
    --accent2: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --good: #34d399;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 헤더 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .header-logo span { color: var(--accent); }
  .header-meta { font-size: 12px; color: var(--muted); }

  /* ── 탭 */
  .tabs {
    display: flex; gap: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .tab {
    padding: 14px 20px; font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.on { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── 레이아웃 */
  .page { display: none; padding: 2rem; max-width: 1400px; margin: 0 auto; }
  .page.on { display: block; }

  /* ── 날짜 필터 */
  .filter-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .filter-bar label { font-size: 12px; color: var(--muted); }
  .filter-bar input, .filter-bar select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: inherit;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; font-family: inherit;
    background: var(--surface2); color: var(--muted); transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.on { background: var(--accent); color: #fff; }

  /* ── KPI 카드 */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 1.5rem; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--kpi-color, var(--accent));
  }
  .kpi-label { font-size: 11px; color: var(--muted); letter-spacing: .04em; margin-bottom: 10px; text-transform: uppercase; }
  .kpi-val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── 차트 패널 */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin-bottom: 1.25rem;
  }
  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .panel-head h3 { font-size: 14px; font-weight: 600; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .lsq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .ldash { width: 20px; height: 2px; border-radius: 2px; flex-shrink: 0; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }

  /* ── 테이블 */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    text-align: right; padding: 10px 12px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2); white-space: nowrap;
  }
  th:first-child { text-align: left; }
  td {
    text-align: right; padding: 9px 12px;
    border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap;
  }
  td:first-child { text-align: left; color: var(--muted); }
  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-g { background: rgba(52,211,153,.15); color: var(--good); }
  .badge-y { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge-r { background: rgba(248,113,113,.15); color: var(--danger); }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">Meta Ads <span>Dashboard</span></div>
  <div class="header-meta" id="hdr-meta">데이터 동기화 중...</div>
</header>

<nav class="tabs">
  <div class="tab on" onclick="setTab('daily',this)">일간</div>
  <div class="tab" onclick="setTab('weekly',this)">주간</div>
  <div class="tab" onclick="setTab('monthly',this)">월간</div>
</nav>

<div class="page on" id="p-daily">
  <div class="filter-bar">
    <label>기간</label>
    <button class="filter-btn on" onclick="setRange(30,this)">30일</button>
    <button class="filter-btn" onclick="setRange(90,this)">90일</button>
    <button class="filter-btn" onclick="setRange(0,this)">전체</button>
    <label style="margin-left:8px">직접입력</label>
    <input type="date" id="d-from">
    <input type="date" id="d-to">
    <button class="filter-btn" onclick="applyCustomRange()">적용</button>
  </div>
  <div class="kpi-grid" id="kpi-d"></div>
  <div class="panel">
    <div class="panel-head">
      <h3>광고비 · ROAS 추이</h3>
      <div class="legend">
        <span class="li"><span class="lsq" style="background:#4f8ef7"></span>광고비</span>
        <span class="li"><span class="ldash" style="background:#34d399"></span>ROAS</span>
      </div>
    </div>
    <div style="position:relative;height:250px"><canvas id="c-d1"></canvas></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>일별 상세</h3></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>날짜</th><th>노출</th><th>클릭</th><th>CTR</th><th>광고비</th><th>CPC</th><th>전환</th><th>매출액</th><th>ROAS</th></tr></thead>
        <tbody id="tb-d"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="page" id="p-weekly">
  <div class="kpi-grid" id="kpi-w"></div>
  <div class="panel">
    <div class="panel-head"><h3>주간 광고비 · ROAS</h3></div>
    <div style="position:relative;height:250px"><canvas id="c-w1"></canvas></div>
  </div>
  <div class="panel">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>주차 (월요일 기준)</th><th>노출</th><th>클릭</th><th>광고비</th><th>전환</th><th>매출액</th><th>ROAS</th></tr></thead>
        <tbody id="tb-w"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="page" id="p-monthly">
  <div class="kpi-grid" id="kpi-m"></div>
  <div class="panel">
    <div class="panel-head"><h3>월간 광고비 · ROAS</h3></div>
    <div style="position:relative;height:250px"><canvas id="c-m1"></canvas></div>
  </div>
  <div class="panel">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>연월</th><th>노출</th><th>클릭</th><th>광고비</th><th>전환</th><th>매출액</th><th>ROAS</th></tr></thead>
        <tbody id="tb-m"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQixMaL_n9clprh6c6Lo0dVThMEXYxH_iY6FrviVDhOucym0HNgMvbH2aBgkN1vVLVg2j7L4Ji3agSe/pub?gid=0&single=true&output=csv';
let DB = {};
let rangeFilter = 30;
let customFrom = null, customTo = null;
const charts = {};

// ── 유틸리티 ──
const N = v => Math.round(v).toLocaleString('ko-KR');
const W = v => '₩' + N(v);
const P = (a,b) => b ? (a/b*100).toFixed(2)+'%' : '-';

async function loadData() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const workbook = XLSX.read(csvText, { type: 'string' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet);

        jsonData.forEach(r => {
            if (r.date) {
                DB[r.date] = {
                    date: String(r.date).trim(),
                    imp: Number(r.imp) || 0,
                    click: Number(r.click) || 0,
                    cost: Number(r.cost) || 0,
                    conv: Number(r.conv) || 0,
                    rev: Number(r.rev) || 0
                };
            }
        });
        document.getElementById('hdr-meta').textContent = `동기화 완료: ${Object.keys(DB).length}일분 데이터`;
        renderAll();
    } catch (e) {
        document.getElementById('hdr-meta').textContent = "로드 실패 (시트 확인 필요)";
    }
}

function getFilteredData() {
    let arr = Object.values(DB).sort((a,b) => a.date.localeCompare(b.date));
    if (customFrom && customTo) return arr.filter(r => r.date >= customFrom && r.date <= customTo);
    if (rangeFilter > 0) {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - rangeFilter);
        const cutStr = cutoff.toISOString().slice(0,10);
        return arr.filter(r => r.date >= cutStr);
    }
    return arr;
}

function renderKPI(data, elId) {
    const cost = data.reduce((a,r)=>a+r.cost,0), rev = data.reduce((a,r)=>a+r.rev,0);
    const conv = data.reduce((a,r)=>a+r.conv,0), roas = cost>0?(rev/cost).toFixed(2):'0.00';
    document.getElementById(elId).innerHTML = `
        <div class="kpi" style="--kpi-color:#4f8ef7"><div class="kpi-label">총 광고비</div><div class="kpi-val">${W(cost)}</div></div>
        <div class="kpi" style="--kpi-color:#fbbf24"><div class="kpi-label">총 매출액</div><div class="kpi-val">${W(rev)}</div></div>
        <div class="kpi" style="--kpi-color:#34d399"><div class="kpi-label">ROAS</div><div class="kpi-val">${roas}x</div></div>
        <div class="kpi" style="--kpi-color:#f87171"><div class="kpi-label">전환수</div><div class="kpi-val">${N(conv)}</div></div>
    `;
}

function drawChart(id, labels, barData, lineData) {
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
        data: {
            labels,
            datasets: [
                { type:'bar', label:'광고비', data:barData, backgroundColor:'rgba(79,142,247,0.6)', yAxisID:'y' },
                { type:'line', label:'ROAS', data:lineData, borderColor:'#34d399', borderWidth:2, pointRadius:2, tension:0.3, yAxisID:'y2' }
            ]
        },
        options: {
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales: {
                y: { position:'left', ticks:{color:'#8896b3', font:{size:10}} },
                y2: { position:'right', grid:{display:false}, ticks:{color:'#34d399', font:{size:10}} },
                x: { ticks:{color:'#8896b3', font:{size:10}} }
            }
        }
    });
}

function renderAll() {
    const dailyData = getFilteredData();
    if (!dailyData.length) return;

    // ── 일간 렌더
    renderKPI(dailyData, 'kpi-d');
    drawChart('c-d1', dailyData.map(r=>r.date.slice(5)), dailyData.map(r=>r.cost), dailyData.map(r=>r.cost?(r.rev/r.cost).toFixed(2):0));
    document.getElementById('tb-d').innerHTML = [...dailyData].reverse().map(r => `
        <tr><td>${r.date}</td><td>${N(r.imp)}</td><td>${N(r.click)}</td><td>${P(r.click,r.imp)}</td><td>${W(r.cost)}</td><td>${r.click?W(Math.round(r.cost/r.click)):'-'}</td><td>${N(r.conv)}</td><td>${W(r.rev)}</td><td><span class="chip ${r.rev/r.cost>=3?'badge-g':r.rev/r.cost>=1?'badge-y':'badge-r'}">${(r.rev/(r.cost||1)).toFixed(2)}x</span></td></tr>
    `).join('');

    // ── 주간 집계 및 렌더
    const weeklyMap = {};
    Object.values(DB).forEach(r => {
        const d = new Date(r.date); 
        const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(d.setDate(diff)).toISOString().slice(0,10);
        if(!weeklyMap[monday]) weeklyMap[monday] = {key:monday, imp:0, click:0, cost:0, conv:0, rev:0};
        weeklyMap[monday].imp+=r.imp; weeklyMap[monday].click+=r.click; weeklyMap[monday].cost+=r.cost; weeklyMap[monday].conv+=r.conv; weeklyMap[monday].rev+=r.rev;
    });
    const weeklyData = Object.values(weeklyMap).sort((a,b)=>a.key.localeCompare(b.key));
    renderKPI(weeklyData, 'kpi-w');
    drawChart('c-w1', weeklyData.map(w=>w.key), weeklyData.map(w=>w.cost), weeklyData.map(w=>w.cost?(w.rev/w.cost).toFixed(2):0));
    document.getElementById('tb-w').innerHTML = [...weeklyData].reverse().map(w => `
        <tr><td>${w.key}</td><td>${N(w.imp)}</td><td>${N(w.click)}</td><td>${W(w.cost)}</td><td>${N(w.conv)}</td><td>${W(w.rev)}</td><td><span class="chip ${w.rev/w.cost>=3?'badge-g':w.rev/w.cost>=1?'badge-y':'badge-r'}">${(w.rev/(w.cost||1)).toFixed(2)}x</span></td></tr>
    `).join('');

    // ── 월간 집계 및 렌더
    const monthlyMap = {};
    Object.values(DB).forEach(r => {
        const month = r.date.slice(0,7);
        if(!monthlyMap[month]) monthlyMap[month] = {key:month, imp:0, click:0, cost:0, conv:0, rev:0};
        monthlyMap[month].imp+=r.imp; monthlyMap[month].click+=r.click; monthlyMap[month].cost+=r.cost; monthlyMap[month].conv+=r.conv; monthlyMap[month].rev+=r.rev;
    });
    const monthlyData = Object.values(monthlyMap).sort((a,b)=>a.key.localeCompare(b.key));
    renderKPI(monthlyData, 'kpi-m');
    drawChart('c-m1', monthlyData.map(m=>m.key), monthlyData.map(m=>m.cost), monthlyData.map(m=>m.cost?(m.rev/m.cost).toFixed(2):0));
    document.getElementById('tb-m').innerHTML = [...monthlyData].reverse().map(m => `
